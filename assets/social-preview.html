<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  #card{width:1280px;height:640px;overflow:hidden}
  *{font-family:-apple-system,"Segoe UI",Helvetica,Arial,sans-serif}
</style></head>
<body>
<div id="card">
<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06140f"/>
      <stop offset="0.55" stop-color="#0c3d2c"/>
      <stop offset="1" stop-color="#05130d"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#dfe7e1"/>
    </linearGradient>
    <linearGradient id="belt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b333c"/>
      <stop offset="1" stop-color="#12171d"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="360" cy="330" rx="360" ry="300" fill="url(#glow)"/>

  <!-- speed streaks behind the runner -->
  <g stroke-linecap="round" opacity="0.5">
    <line x1="70" y1="150" x2="250" y2="150" stroke="#3fb950" stroke-width="10" opacity="0.55"/>
    <line x1="40" y1="205" x2="300" y2="205" stroke="#ffffff" stroke-width="7" opacity="0.28"/>
    <line x1="80" y1="262" x2="230" y2="262" stroke="#3fb950" stroke-width="8" opacity="0.4"/>
    <line x1="30" y1="120" x2="170" y2="120" stroke="#ffffff" stroke-width="6" opacity="0.2"/>
  </g>

  <!-- ===== treadmill ===== -->
  <g filter="url(#soft)">
    <!-- belt -->
    <rect x="120" y="470" width="440" height="70" rx="34" fill="url(#belt)"/>
    <ellipse cx="150" cy="505" rx="20" ry="28" fill="#0c1016"/>
    <ellipse cx="530" cy="505" rx="20" ry="28" fill="#0c1016"/>
    <!-- belt tread marks -->
    <g stroke="#3b4650" stroke-width="4" opacity="0.7">
      <line x1="210" y1="486" x2="210" y2="524"/>
      <line x1="270" y1="486" x2="270" y2="524"/>
      <line x1="330" y1="486" x2="330" y2="524"/>
      <line x1="390" y1="486" x2="390" y2="524"/>
      <line x1="450" y1="486" x2="450" y2="524"/>
    </g>
    <!-- legs / feet -->
    <path d="M150 540 l40 40 h20 l-20 -46 z" fill="#12171d"/>
    <path d="M500 540 l40 40 h20 l-20 -46 z" fill="#12171d"/>
    <!-- console post + screen -->
    <rect x="556" y="300" width="16" height="180" rx="7" fill="#2b333c"/>
    <g transform="translate(516,256) rotate(8)">
      <rect x="0" y="0" width="150" height="80" rx="12" fill="#0c1016" stroke="#2b333c" stroke-width="3"/>
      <text x="16" y="34" font-size="20" fill="#3fb950" font-weight="700">SPEED</text>
      <rect x="16" y="46" width="20" height="18" rx="3" fill="#3fb950"/>
      <rect x="42" y="40" width="20" height="24" rx="3" fill="#3fb950"/>
      <rect x="68" y="32" width="20" height="32" rx="3" fill="#3fb950"/>
      <rect x="94" y="24" width="20" height="40" rx="3" fill="#f0883e"/>
    </g>
    <rect x="512" y="300" width="150" height="12" rx="6" fill="#2b333c"/>
  </g>

  <!-- ===== running CLAUDE.md ===== -->
  <g transform="translate(330,300) rotate(-9)">
    <!-- back arm -->
    <path d="M-92 40 q-52 6 -70 44" stroke="#e6ebe6" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- back leg (lifted, bent) -->
    <path d="M-30 150 q-8 44 -54 58" stroke="#e6ebe6" stroke-width="30" stroke-linecap="round" fill="none"/>
    <g transform="translate(-92,214) rotate(-24)"><rect x="-42" y="-14" width="74" height="30" rx="15" fill="#f0883e"/><rect x="-42" y="10" width="80" height="10" rx="5" fill="#fff"/></g>

    <!-- paper body -->
    <g filter="url(#soft)">
      <path d="M-95 -150 h150 l40 40 v290 a16 16 0 0 1 -16 16 h-174 a16 16 0 0 1 -16 -16 v-314 a16 16 0 0 1 16 -16 z" fill="url(#paper)"/>
      <path d="M55 -150 l40 40 h-40 z" fill="#c3ccc5"/>
    </g>
    <!-- sweatband -->
    <rect x="-95" y="-120" width="190" height="30" fill="#e5484d"/>
    <path d="M92 -112 l26 -8 -6 16 z" fill="#e5484d"/>
    <!-- face: determined, panting -->
    <g fill="#1b2b22">
      <circle cx="-34" cy="-66" r="9"/>
      <circle cx="26" cy="-66" r="9"/>
      <path d="M-40 -74 l18 6" stroke="#1b2b22" stroke-width="6" stroke-linecap="round"/>
      <path d="M40 -74 l-18 6" stroke="#1b2b22" stroke-width="6" stroke-linecap="round"/>
    </g>
    <!-- open panting mouth + tongue -->
    <path d="M-20 -40 q16 26 40 0 z" fill="#3a2b2b"/>
    <path d="M-4 -30 q10 16 22 2 q-8 -6 -22 -2 z" fill="#e5687a"/>
    <!-- title + content lines (getting sparse toward bottom = slimming) -->
    <text x="-20" y="0" font-size="21" font-weight="800" fill="#0c3d2c">CLAUDE.md</text>
    <g stroke="#aab4ae" stroke-width="7" stroke-linecap="round">
      <line x1="-70" y1="30" x2="60" y2="30"/>
      <line x1="-70" y1="54" x2="30" y2="54"/>
      <line x1="-70" y1="78" x2="46" y2="78"/>
      <line x1="-70" y1="102" x2="0" y2="102" opacity="0.6"/>
      <line x1="-70" y1="124" x2="-30" y2="124" opacity="0.35"/>
    </g>

    <!-- front arm (pumping forward, clear of the title) -->
    <path d="M78 62 q54 -4 68 -34" stroke="#f5f7f5" stroke-width="26" stroke-linecap="round" fill="none"/>
    <!-- front leg (planted, striding) -->
    <path d="M40 150 q20 40 8 74" stroke="#f5f7f5" stroke-width="30" stroke-linecap="round" fill="none"/>
    <g transform="translate(40,232) rotate(6)"><rect x="-30" y="-14" width="86" height="30" rx="15" fill="#f0883e"/><rect x="-30" y="10" width="92" height="10" rx="5" fill="#fff"/></g>

    <!-- sweat droplets flying off -->
    <g fill="#58a6ff">
      <path d="M118 -150 q10 12 0 22 q-10 -10 0 -22 z"/>
      <path d="M150 -104 q8 10 0 18 q-8 -8 0 -18 z"/>
      <path d="M132 -60 q7 8 0 15 q-7 -7 0 -15 z" opacity="0.85"/>
    </g>
  </g>

  <!-- ===== wordmark + tagline ===== -->
  <g transform="translate(690,236)">
    <text x="0" y="0" font-size="118" font-weight="900" fill="#ffffff" letter-spacing="-3">dry<tspan fill="#3fb950">docs</tspan></text>
    <text x="4" y="66" font-size="33" font-weight="700" fill="#e7efe9">Put your CLAUDE.md</text>
    <text x="4" y="110" font-size="33" font-weight="700" fill="#e7efe9">on an intensive cardio run.</text>
    <text x="6" y="168" font-size="23" font-weight="600" fill="#8aa99a">Slim it into a lean index. Detail moves to docs/,</text>
    <text x="6" y="200" font-size="23" font-weight="600" fill="#8aa99a">loaded on demand. A Claude Code plugin.</text>
    <!-- before/after chips -->
    <g transform="translate(6,236)">
      <rect x="0" y="0" width="150" height="46" rx="23" fill="#3a1417" stroke="#e5484d" stroke-width="2"/>
      <text x="24" y="30" font-size="22" font-weight="800" fill="#ff8b91">fat 13KB</text>
      <text x="168" y="31" font-size="26" font-weight="800" fill="#8aa99a">&#8594;</text>
      <rect x="200" y="0" width="168" height="46" rx="23" fill="#0f2e1e" stroke="#3fb950" stroke-width="2"/>
      <text x="224" y="30" font-size="22" font-weight="800" fill="#5ee27a">lean 9.7KB</text>
    </g>
  </g>
</svg>
</div>
</body>
</html>
